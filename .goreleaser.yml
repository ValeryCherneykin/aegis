version: 2
project_name: aegis

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: aegis
    main: ./cmd/aegis
    binary: aegis
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: valerycherneykin
    name: aegis
  mode: replace
  name_template: "v{{ .Version }}"

# dockers_v2 replaces the old dockers: + docker_manifests: pair — one
# buildx invocation builds and pushes the whole multi-arch manifest
# instead of two separate images stitched together afterwards.
dockers_v2:
  - ids: [aegis]
    dockerfile: Dockerfile.goreleaser   # the copy-only one — see that file's header comment
    images:
      - ghcr.io/valerycherneykin/aegis
    tags:
      - "{{ .Version }}"
      - "{{ if not .IsNightly }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
    # Anything the Dockerfile COPYs besides the binary itself must be
    # listed here — GoReleaser's docker build context is a temp dir, not
    # your repo, so it won't see policies/ unless you say so explicitly.
    extra_files:
      - policies/
